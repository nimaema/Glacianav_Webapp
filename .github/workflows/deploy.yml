name: Build and publish image

# On every push to main: build the production image and push it to GHCR.
# Watchtower on the server then pulls the new image and redeploys automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nimaema/glacianav_webapp
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Nova worker Docker metadata
        id: nova-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nimaema/glacianav_nova-worker
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* values get inlined into the client JS bundle at
          # build time (not read at container runtime), so they must be
          # passed as build args from repo secrets — Settings → Secrets and
          # variables → Actions. Everything server-only (DATABASE_URL,
          # SUPABASE_SERVICE_ROLE_KEY, AUTH_REQUIRED, TUNNEL_TOKEN) lives
          # only in the server's .env, never touches this build.
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build and push Nova worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nova-worker/Dockerfile
          push: true
          tags: ${{ steps.nova-meta.outputs.tags }}
          labels: ${{ steps.nova-meta.outputs.labels }}
          cache-from: type=gha,scope=nova-worker
          cache-to: type=gha,mode=max,scope=nova-worker
